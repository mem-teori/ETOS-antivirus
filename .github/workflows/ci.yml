name: ETOS-Antivirus CI

on:
  push:
    branches: ["main", "master", "develop"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install runtime and dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Compile Python files
        run: python -m compileall security tests

      - name: Lint ETOS-Antivirus modules
        run: flake8 security tests

      - name: Run mapper and smoke tests
        run: pytest -q

      - name: Run demo in CI mode
        run: python security/security_etos_demo.py --once --sleep 0
