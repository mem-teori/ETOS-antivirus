name: ETOS-Antivirus CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest flake8

      - name: Check repo structure
        run: |
          test -f security/security_mapper.py
          test -f security/security_etos_demo.py

      - name: Check syntax
        run: python -m compileall security tests

      - name: Lint
        run: flake8 security tests

      - name: Run tests
        run: pytest -q

      - name: Run ETOS-Antivirus smoke test
        run: python security/security_etos_demo.py --once --sleep 0
